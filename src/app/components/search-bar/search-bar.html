<mat-form-field class="w-full" appearance="fill">
  <input matInput type="text" [(ngModel)]="value" placeholder="Enter name of the product" />
  @if (value()) {
    <mat-icon matSuffix (click)="clearValue()" style="cursor: pointer">close</mat-icon>
  } @else {
    <mat-icon matSuffix>search</mat-icon>
  }
</mat-form-field>
